<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Validar codigo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>Validar codigo</h1>
      <form action="/verify-code" method="post">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" readonly required>
        <label for="code">Codigo de 6 digitos</label>
        <input id="code" name="code" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" required>
        <p id="error" class="error" hidden></p>
        <button type="submit">Validar</button>
      </form>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('email').value = params.get('email') || '';
    const error = params.get('error');
    if (error) {
      const element = document.getElementById('error');
      element.textContent = error;
      element.hidden = false;
    }
  </script>
</body>
</html>
